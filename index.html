<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="
  background-image:url('forest36.png');
  background-size:cover;
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:orange;
">

<div style="
  font-size:60px;
  border:2px solid orange;
  background:rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  box-shadow:0 0 20px orange;
  padding:20px;
  margin-bottom:20px;">
  Forest 36
</div>

  <h1>AI Photo Generator</h1>
  <p>Type your prompt and generate an AI image</p>

  <input id="prompt" placeholder="e.g., A sunset over mountains">
  <button onclick="generate()">Generate</button>

  <div>
    <img id="result" src="" alt="Generated Image"/>
  </div>

  <script>
    // Hugging Face Spaces public API (no key required)
    const HF_SPACES_API_URL = "https://hf.space/embed/stabilityai/stable-diffusion-2-1/api/predict/";

    async function generate() {
      const prompt = document.getElementById("prompt").value;
      if(!prompt) { alert("Please enter a prompt"); return; }

      document.getElementById("result").src = "";
      document.getElementById("result").alt = "Generating...";

      try {
        const res = await fetch(HF_SPACES_API_URL, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({data:[prompt]})
        });

        const data = await res.json();
        if(data && data.data && data.data[0]) {
          document.getElementById("result").src = "data:image/png;base64," + data.data[0];
          document.getElementById("result").alt = "Generated Image";
        } else {
          throw new Error("No image returned");
        }

      } catch (err) {
        console.error(err);
        alert("Error generating image. See console.");
        document.getElementById("result").alt = "Error generating image";
      }
    }
  </script>


</body>
</html>
