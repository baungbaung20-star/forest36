<div style="color:orange; font-size:60px; border:2px solid orange; background: rgba(0,0,0,0.3);
backdrop-filter: blur(10px); box-shadow: 0 0 20px orange;">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
const supabaseUrl = 'https://gcxplhtoujgigaovqazu.supabase.co'
const supabaseKey = 'sb_publishable_h47zIuNEs9ZmTQF0FI7rhA_ZCZhRdQZ'
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)
    
  </script>

  <input id="name" placeholder="Type name">
<button onclick="save()">Save</button>

<script>
async function save() {
  const name = document.getElementById("name").value
  console.log("Clicked", name)

  const { data, error } = await supabase
    .from('users')
    .insert([{ name: name }])

  console.log("DATA:", data)
  console.log("ERROR:", error)

  if(error){
    alert("Error: " + error.message)
  } else {
    alert("Saved!")
  }
}
</script>
