<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="
  background-image:url('forest36.png');
  background-size:cover;
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:orange;
">

<div style="
  font-size:60px;
  border:2px solid orange;
  background:rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  box-shadow:0 0 20px orange;
  padding:20px;
  margin-bottom:20px;">
  Forest 36
</div>

  <h1>AI Photo Generator</h1>
  <p>Type your prompt and generate an AI image</p>

  <input id="prompt" placeholder="Type something like 'A sunset over mountains'">
  <button onclick="generate()">Generate</button>

  <div>
    <img id="result" src="" alt="Generated Image"/>
  </div>

  <script>
    // Hugging Face Inference API URL
    const HF_PUBLIC_API_URL = "https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-2-1";

    // ⚠️ Free-tier: API key usually required. Public frontend risk exists if key is added here.
    const HF_API_KEY = ""; // optional, can leave blank for public demo models

    async function generate() {
      const prompt = document.getElementById("prompt").value;
      if(!prompt) { alert("Please enter a prompt"); return; }

      document.getElementById("result").src = ""; // reset image
      document.getElementById("result").alt = "Generating...";

      const bodyData = {
        inputs: prompt,
        options: { wait_for_model: true }
      };

      try {
        const res = await fetch(HF_PUBLIC_API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            ...(HF_API_KEY && { "Authorization": "Bearer " + HF_API_KEY })
          },
          body: JSON.stringify(bodyData)
        });

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        document.getElementById("result").src = url;
        document.getElementById("result").alt = "Generated Image";

      } catch (err) {
        console.error(err);
        alert("Error generating image. See console.");
        document.getElementById("result").alt = "Error generating image";
      }
    }
  </script>

</body>
</html>
